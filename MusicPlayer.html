<style>
    
@import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap');

:root{
--VPRDR: #770606;
--VPRFLGLG: #7a6f05;
--VPRTEXTCOL: #363636;
--VPRALERT:  #dd0000;
}
.alert{
    font-family:"Black Ops One", sans-serif;
    color: var(--VPRALERT);
    background-color: black;
}
.center{
    text-align: center;
    font-family: 'inter', sans-serif;
   color: var(--VPRTEXTCOL);
}
.left{
    text-align: left;
    font-family: 'inter', sans-serif;
    color: var(--VPRTEXTCOL);
}
.right{
    text-align: left;
    font-family: 'inter', sans-serif;
    color: var(--VPRTEXTCOL);
}
.TitleHead{
text-align: center;
font-family: 'monsterraat' sans-serif;
color: white;
background-color: #770606;
}
.HeadersLeft{
    text-align: left;
    color: #363636;
    font-family: 'monsterraat' sans-serif;
}
.HeadersRight{

.middleLinks{

.Transcript{
    font-family: 'Share Tech Mono', monospace;
}
.button{
    background-color: #810202;
    border-width: 100%;
    border-style: solid;
    border-color: #363636;
    color: black;
    font-family: 'inter', sans-serif;
    border-radius: 5%;
    cursor: pointer;
    transition: background-color 0.2s;
    
}
.VoSli{
    -webkit-appearance: none;
    appearance: none;
    cursor: pointer;
    transition: background-color 0.2s;
   
}
.VoSli::-webkit-slider-runnable-track {
    background-color: #000000;
    width: 50%;
    height: 30%;
    border-radius: 50%;
}
.VoSli::-webkit-slider-thumb{
    -webkit-appearance: none;
   appearance: none;
    height: 10px;
    width: 10px;
    border-radius: 100%;
    background-color: #810202;
    margin-top: -3%;
  
}
.VoSli:hover{
    background-color: #363636;
}
.button:hover{
    background-color: #7a6f05;
}
</style>
<audio id="VPRAS">
<source src="VPRASRAID.m4a">

<audio id="VPRN">
    <source src="VPROSTNuke.m4a">
</audio>

</head>
<body>

<div class="alert">
    <h2>ALL AUDIO HERE IS REMIXED PIXABAY MUSIC, AND THUS COPYWRIGHT FREE. CREDITS TO THE ORIGINAL TRACK CREATORS ARE BELOW THE TRACKS.</h2>
</div>
<br>
<br>
<button class="button" onclick="PNT()">
    Play VPR Nuke Theme
</button>
<br>
<p>Original Track by Palyudin on Pixabay.</p>
<br>
<button class="button" onclick="PVPRS()">Play VPRAS Raid OST</button>
<br>
<p>original song by TuneTank on pixabay.</p>
<br>
<button class="button" onclick="pawse()">Stop Music</button>

<h3>Volume Control</h3>
<br>
<input type="range" class="VoSli"
id="volumeSlide"
min="0"
max="100"
value="20"
oninput="Vol()">


<script>
    var VPRD = document.getElementById("VPRAS");
    var VPRNT = document.getElementById("VPRN");
    function PVPRS(){
        VPRD.play();
        VPRD.currentTime = 0;
        VPRNT.pause();
    }
    function PNT(){
   VPRNT.play();
   VPRNT.currentTime = 0;
   VPRD.pause();
    }
    function pawse(){
        VPRD.pause();
        VPRNT.pause();
    }
    
    function STOP(){
        VPRD.pause();
        VPRD.currentTime = 0;
    }
    function Vol(){
        var volume = Number(document.getElementById("volumeSlide").value);
        var ActV = volume / 100;
        VPRD.volume = ActV;
        VPRNT.volume = ActV;
    } 
</script>
</body>
