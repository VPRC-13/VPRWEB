<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">


 <link rel="stylesheet" href="Style.css">

<audio id="VPRAS">
<source src="VPRASRAID.m4a">
</audio>
<audio id="VPRN">
    <source src="VPROSTNuke.m4a">
</audio>

</head>
<body>
    <div class="TitleHead">
        <h1>VPR Music Player</h1>
    </div>

<div class="alert">
    <h2>ALL AUDIO HERE IS REMIXED PIXABAY MUSIC, AND THUS COPYWRIGHT FREE. CREDITS TO THE ORIGINAL TRACK CREATORS ARE BELOW THE TRACKS.</h2>
</div>
<br>
<br>
<button class="button" onclick="PNT()">
    Play VPR Nuke Theme
</button>
<br>
<p>Original Track by Palyudin on Pixabay.</p>
<br>
<button class="button" onclick="PVPRS()">Play VPRAS Raid OST</button>
<br>
<p>original song by TuneTank on pixabay.</p>
<br>
<button class="button" onclick="pawse()">Stop Music</button>

<h3>Volume Control</h3>
<br>
<input type="range" class="VoSli"
id="volumeSlide"
min="0"
max="100"
value="20"
oninput="Vol()">

<div id="nowPlaying" >
    now playing: Nothing
</div>


<script>
    var VPRD = document.getElementById("VPRAS");
    var VPRNT = document.getElementById("VPRN");
    function PVPRS(){
        VPRD.play();
        VPRD.currentTime = 0;
        VPRNT.pause();
        setTimeout(RaidName() , 500);
        setTimeout(changeTrack() , 1000);
    }
    function PNT(){
   VPRNT.play();
   VPRNT.currentTime = 0;
   VPRD.pause();
   setTimeout(NukeName() , 500);
   setTimeout(changeTrack() , 1000);
    }
    function pawse(){
        VPRD.pause();
        VPRNT.pause();
        setTimeout(NoPlay() , 500);
    }
    
    function STOP(){
        VPRD.pause();
        VPRD.currentTime = 0;
    }
    function Vol(){
        var volume = Number(document.getElementById("volumeSlide").value);
        var ActV = volume / 100;
        VPRD.volume = ActV;
        VPRNT.volume = ActV;
    } 
var trackName = "Undetermined."
function NukeName(){
    trackName = "VPR-HQ Nuke Theme"
}
function RaidName(){
    trackName = "VPR-HQ VPRAS Raid Theme"
}
function NoPlay(){
    trackName = "None"
    setTimeout(changeTrack , 1000);
}
    function changeTrack(){
    var popup = document.getElementById("nowPlaying")
    popup.innerHTML = "now playing: " + trackName;
    popup.classList.add("show");

    setTimeout(function(){
        popup.classList.remove("show")} , 3000);
    
    
    
    setTimeout( function(){
    popup.style.animation = "none";
    popup.offsetHeight;
    popup.style.animation = "rise 6s ease"
    
     } , 300)
    }
    </script>
</body>
</html>
